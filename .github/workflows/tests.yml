name: Tests

on:
  pull_request:
    branches:
      - "**"

jobs:
  tests:
    if: ${{ !github.event.pull_request.draft }}
    name: Pest (Shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    env:
      DB_CONNECTION: sqlite
      DB_DATABASE: ":memory:"

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, dom, fileinfo, sqlite3, pcntl
          coverage: none

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v3

      - name: Prepare application
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run tests
        run: vendor/bin/pest --parallel --shard=${{ matrix.shard }}/4

  test-results:
    if: ${{ !github.event.pull_request.draft }}
    name: Test Results
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - name: All shards passed
        run: echo "All 4 test shards passed successfully."
